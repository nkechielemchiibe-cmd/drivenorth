function getDeal(car){
  if(car.type==="hire")return null;
  const b=MKTPX[car.make]?.[car.year]; if(!b||!car.price)return null;
  const r=car.price/b;
  // New cars at MSRP are always Fair Price — only used cars get Above Market
  if(car.type==="new"){
    if(r<0.96)return{label:"🔥 Great Deal",color:GR,pct:Math.round((1-r)*100)+"% below MSRP"};
    if(r<1.0)return{label:"✅ Good Deal",color:"#5dade2",pct:Math.round((1-r)*100)+"% below MSRP"};
    if(r<=1.08)return{label:"⚖️ MSRP Price",color:OR,pct:"Standard dealer price"};
    return{label:"⚠️ Above MSRP",color:"#e74c3c",pct:Math.round((r-1)*100)+"% markup"};
  }
  if(r<0.88)return{label:"🔥 Great Deal",color:GR,pct:Math.round((1-r)*100)+"% below avg"};
  if(r<0.97)return{label:"✅ Good Deal",color:"#5dade2",pct:Math.round((1-r)*100)+"% below avg"};
  if(r<1.05)return{label:"⚖️ Fair Price",color:OR,pct:"Near market avg"};
  return{label:"⚠️ Above Market",color:"#e74c3c",pct:Math.round((r-1)*100)+"% above avg"};
}

// ─── NHTSA VIN API ────────────────────────────────────────────────────────────
async function decodeVIN(vin){
  try{
    const r=await fetch("https://vpic.nhtsa.dot.gov/api/vehicles/decodevinvalues/"+vin+"?format=json");
    const d=await r.json(); const v=d.Results?.[0];
    if(!v||v.ErrorCode?.startsWith("11"))return null;
    return{make:v.Make,model:v.Model,year:v.ModelYear,trim:v.Trim,fuel:v.FuelTypePrimary,engine:v.DisplacementL?parseFloat(v.DisplacementL).toFixed(1)+"L "+v.EngineCylinders+"-cyl":"",trans:v.TransmissionStyle,drive:v.DriveType,body:v.BodyClass,doors:v.Doors,plant:v.PlantCity&&v.PlantCountry?v.PlantCity+", "+v.PlantCountry:"",maker:v.Manufacturer,series:v.Series,ok:!v.ErrorCode||v.ErrorCode==="0"};
  }catch{return null;}
}

// ─── IMAGE COMPRESSION ────────────────────────────────────────────────────────
function compressImg(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement("canvas");
        const s=Math.min(1,900/img.width); c.width=img.width*s; c.height=img.height*s;
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.78));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

const bst=t=>({padding:"2px 7px",fontWeight:700,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",borderRadius:3,...({new:{background:"#e8400c",color:"#fff"},used:{background:"#2a2a2a",color:"#f0ede8",border:"1px solid rgba(255,255,255,.1)"},hire:{background:"#d4a843",color:"#000"},CA:{background:"rgba(0,0,0,.7)",color:"#fff"},US:{background:"rgba(0,0,0,.7)",color:"#fff"},CPO:{background:"#2980b9",color:"#fff"},Priv:{background:"#8e44ad",color:"#fff"},EV:{background:"#27ae60",color:"#fff"}}[t]||{background:"#242424",color:"#888"})});

// ─── CONDITION SCORE ──────────────────────────────────────────────────────────
function CondScore({score}){
  if(!score)return null;
  const labels=["","Poor","Fair","Good","Very Good","Excellent"];
  const colors=["","#e74c3c","#e67e22","#f1c40f","#27ae60","#2ecc71"];
  return(
    <div style={{display:"flex",alignItems:"center",gap:5}}>
      <div style={{display:"flex",gap:2}}>{[1,2,3,4,5].map(i=><div key={i} style={{width:14,height:6,borderRadius:2,background:i<=score?colors[score]:"rgba(128,128,128,.2)"}}/>)}</div>
      <span style={{fontSize:10,color:colors[score],fontWeight:700}}>{labels[score]}</span>
    </div>
  );
}


// ─── PEXELS PHOTO FETCHER ─────────────────────────────────────────────────────
const PEXELS_KEY = "FmAUOHE1t0xjjKuqXA6M4azR9zviHT0MjTD2zJ42zgZPZnZzuxRT3qDt";
const PEXELS_CACHE = {};

// Search queries per car ID
const CAR_PHOTO_QUERIES = {
  "n1":"Toyota RAV4 hybrid white SUV",
  "n2":"Honda CRV gray silver SUV",
  "n3":"Ford F-150 Lightning electric truck",
  "n4":"Tesla Model Y white SUV",
  "n5":"Chevrolet Silverado white pickup truck",
  "n6":"Ford Mustang GT blue sports car",
  "u1":"Toyota Camry black sedan car",
  "u2":"Ford F-150 white pickup truck",
  "u3":"Honda Civic red sedan car",
  "u4":"Subaru Outback green wagon car",
  "u5":"Mazda CX5 grey SUV car",
  "u6":"Ram pickup truck black",
  "u7":"Jeep Grand Cherokee white SUV",
  "u8":"Audi Q5 white luxury SUV",
  "u9":"Tesla Model 3 blue electric car",
  "h1":"Toyota Corolla silver sedan",
  "h2":"Ford Explorer silver SUV",
  "h3":"Tesla Model 3 white electric",
  "h4":"Dodge Challenger purple muscle car",
  "h5":"Toyota Sienna white minivan",
  "h6":"Ford Mustang convertible blue",
  "h7":"Chevrolet Corvette blue sports car",
  "h8":"Cadillac Escalade black luxury SUV",
};

async function fetchPexelsPhoto(carId) {
  if (PEXELS_CACHE[carId]) return PEXELS_CACHE[carId];
  const query = CAR_PHOTO_QUERIES[carId];
  if (!query) return null;
  try {
    const res = await fetch(
      "https://api.pexels.com/v1/search?query=" + encodeURIComponent(query) + "&per_page=1&orientation=landscape",
      { headers: { Authorization: PEXELS_KEY } }
    );
    const data = await res.json();
    const url = data.photos?.[0]?.src?.large || data.photos?.[0]?.src?.medium || null;
    if (url) PEXELS_CACHE[carId] = url;
    return url;
  } catch(e) { return null; }
}

// ─── CAR IMAGE ────────────────────────────────────────────────────────────────
function CarImg({car, height=155, style={}, showNav=false}) {
  const [idx, setIdx] = useState(0);
  const [pexelsUrl, setPexelsUrl] = useState(null);
  const [loading, setLoading] = useState(false);

  const manualPhotos = (car.photos || []).filter(Boolean);

  useEffect(() => {
    if (manualPhotos.length === 0 && !pexelsUrl && !loading && car.id) {
      setLoading(true);
      fetchPexelsPhoto(car.id).then(url => {
        if (url) setPexelsUrl(url);
        setLoading(false);
      });
    }
  }, [car.id]);

  const allPhotos = manualPhotos.length > 0 ? manualPhotos : (pexelsUrl ? [pexelsUrl] : []);
  const src = allPhotos.length > 0 ? allPhotos[idx] : (CAR_IMGS[car.body] || Object.values(CAR_IMGS)[0]);

  return (
    <div style={{position:"relative",width:"100%",height,...style,overflow:"hidden",background:"#131313"}}>
      {loading && manualPhotos.length === 0 && !pexelsUrl && (
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f0f",zIndex:2}}>
          <div style={{fontSize:10,color:"#555",textAlign:"center"}}>
            <div style={{fontSize:18,marginBottom:3}}>📷</div>
            Loading...
          </div>
        </div>
      )}
      <img
        src={src}
        alt={car.make + " " + car.model}
        style={{width:"100%",height:"100%",objectFit:"cover"}}
        onError={e => { e.target.src = CAR_IMGS[car.body] || Object.values(CAR_IMGS)[0]; }}
      />
      {showNav && allPhotos.length > 1 && <>
        <button onClick={e=>{e.stopPropagation();setIdx(i=>(i-1+allPhotos.length)%allPhotos.length);}} style={{position:"absolute",left:7,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,.65)",border:"none",color:"#fff",width:26,height:26,borderRadius:"50%",cursor:"pointer",fontSize:15,lineHeight:"26px",textAlign:"center"}}><</button>
        <button onClick={e=>{e.stopPropagation();setIdx(i=>(i+1)%allPhotos.length);}} style={{position:"absolute",right:7,top:"50%",transform:"translateY(-50%)",background:"rgba(0,0,0,.65)",border:"none",color:"#fff",width:26,height:26,borderRadius:"50%",cursor:"pointer",fontSize:15,lineHeight:"26px",textAlign:"center"}}>></button>
      </>}
      {allPhotos.length > 1 && !showNav && (
        <div style={{position:"absolute",bottom:7,right:8,background:"rgba(0,0,0,.65)",color:"#fff",fontSize:9,padding:"2px 6px",borderRadius:10,fontWeight:700}}>📷 {allPhotos.length}</div>
      )}
    </div>
  );
}


// ─── TOAST ────────────────────────────────────────────────────────────────────
function Toast({msg,type,T}){
  const c={success:"#27ae60",error:"#e8400c",info:"#2980b9"}[type]||"#27ae60";
  if(!msg)return null;
  return <div style={{position:"fixed",bottom:70,right:20,background:T.B2,border:"1px solid "+T.BD2,borderLeft:"4px solid "+c,padding:"12px 17px",borderRadius:7,fontSize:13,zIndex:999,color:T.W,boxShadow:"0 8px 28px rgba(0,0,0,.5)",maxWidth:300,animation:"dn_fade .3s"}}>{msg}</div>;
}

// ─── VIN MODAL ────────────────────────────────────────────────────────────────
function VINModal({prefill,rows,onClose,T}){
  const [vin,setVin]=useState(prefill||"");
  const [loading,setLoading]=useState(false);
  const [res,setRes]=useState(null);
  const [err,setErr]=useState("");
  const check=useCallback(async v=>{
    const vn=v||vin; if(vn.length!==17){setErr("VIN must be exactly 17 characters.");return;}
    setLoading(true);setErr("");setRes(null);
    const d=await decodeVIN(vn); setLoading(false);
    if(!d){setErr("Could not reach NHTSA. Check connection.");return;}
    if(!d.ok){setErr("VIN not found in NHTSA database.");return;}
    setRes(d);
  },[vin]);
  useEffect(()=>{if(prefill?.length===17)check(prefill);},[]);
  const Row=({l,v})=><div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid "+T.BD}}><span style={{fontSize:12,color:T.M}}>{l}</span><span style={{fontSize:12,fontWeight:700,color:T.W}}>{v||"—"}</span></div>;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:600,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:T.B2,border:"1px solid "+T.BD2,borderTop:"3px solid #d4a843",borderRadius:10,width:"100%",maxWidth:520,padding:26,position:"relative",maxHeight:"90vh",overflowY:"auto"}}>
        <button onClick={onClose} style={{position:"absolute",top:12,right:14,background:"none",border:"none",color:T.M,fontSize:20,cursor:"pointer"}}>✕</button>
        <h3 style={{fontSize:20,marginBottom:3,fontWeight:900,color:T.W}}>🔍 VIN Decoder</h3>
        <div style={{background:"rgba(39,174,96,.08)",border:"1px solid rgba(39,174,96,.2)",borderRadius:5,padding:"7px 11px",marginBottom:14,fontSize:11,color:T.M}}>✅ Powered by the real <strong style={{color:"#27ae60"}}>NHTSA vPIC API</strong> — official US vehicle database</div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={vin} onChange={e=>setVin(e.target.value.toUpperCase())} maxLength={17} placeholder="Enter 17-character VIN" style={{flex:1,background:T.B3,border:"1px solid "+T.BD2,color:T.W,padding:"9px 12px",fontSize:12,borderRadius:5,outline:"none",fontFamily:"monospace",letterSpacing:1}}/>
          <button onClick={()=>check()} disabled={loading} style={{background:loading?T.B4:"#e8400c",color:loading?T.M:"#fff",border:"none",padding:"9px 18px",fontWeight:700,fontSize:12,borderRadius:5,cursor:loading?"not-allowed":"pointer",fontFamily:"inherit"}}>{loading?"⏳":"Check"}</button>
        </div>
        {err&&<div style={{background:"rgba(231,76,60,.1)",border:"1px solid rgba(231,76,60,.3)",borderRadius:5,padding:"9px 12px",fontSize:12,color:"#e74c3c",marginBottom:10}}>{err}</div>}
        {res&&<><div style={{background:T.B3,borderRadius:8,padding:"12px 14px",marginBottom:10}}><div style={{fontSize:9,color:T.M,letterSpacing:2,textTransform:"uppercase",marginBottom:3}}>Vehicle Decoded</div><div style={{fontWeight:800,fontSize:15,color:T.W}}>{res.year+" "+res.make+" "+res.model+" "+(res.trim||"")}</div>{res.maker&&<div style={{fontSize:11,color:T.M,marginTop:1}}>{res.maker}</div>}</div>
        <Row l="Body Class" v={res.body}/><Row l="Engine" v={res.engine}/><Row l="Fuel Type" v={res.fuel}/><Row l="Drive" v={res.drive}/><Row l="Transmission" v={res.trans}/><Row l="Doors" v={res.doors}/><Row l="Plant" v={res.plant}/>{res.series&&<Row l="Series" v={res.series}/>}

              <div key={l} style={{background:T.B3,padding:"9px 11px",borderRadius:6}}><div style={{fontSize:9,color:T.M,letterSpacing:1.5,textTransform:"uppercase",marginBottom:2}}>{l}</div><div style={{fontWeight:700,fontSize:12,color:T.W}}>{v||"—"}</div></div>
            ))}

          {car.desc&&<div style={{background:T.B3,borderRadius:7,padding:"12px 13px",fontSize:13,lineHeight:1.8,color:T.W,marginBottom:12}}>{car.desc}</div>}

// ─── SUBMIT MODAL ─────────────────────────────────────────────────────────────
function SubmitModal({onClose,onSave,toast2,T}){
  const [f,setF]=useState({type:"new",country:"CA",make:"",model:"",year:"",trim:"",body:"SUV",extColor:"Black",intColor:"Black",fuel:"Gasoline",trans:"Automatic",drive:"AWD",mileage:"",price:"",rate:"",city:"",province:"",dealer:"",sellerType:"Dealer",phone:"",email:"",vin:"",desc:"",condition:"Good",owners:"1 owner",accidentFree:true});
  const [photos,setPhotos]=useState([]);
  const [vinDec,setVinDec]=useState(null);
  const [vinLoad,setVinLoad]=useState(false);
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const ih=f.type==="hire";
  const IS={background:T.B3,border:"1px solid "+T.BD2,color:T.W,padding:"8px 11px",fontSize:12,borderRadius:5,outline:"none",width:"100%",fontFamily:"inherit"};
  const autoVIN=async()=>{
    if(f.vin.length!==17){toast2("VIN must be 17 characters","error");return;}
    setVinLoad(true);
    const d=await decodeVIN(f.vin); setVinLoad(false);
    if(!d?.ok){toast2("VIN not found in NHTSA","error");return;}
    setF(p=>({...p,make:d.make||p.make,model:d.model||p.model,year:d.year||p.year,trim:d.trim||p.trim,fuel:d.fuel||p.fuel,trans:d.trans||p.trans,drive:d.drive||p.drive}));
    setVinDec(d); toast2("✅ Vehicle details auto-filled from NHTSA!");
  };
  const handlePhotos=async files=>{for(const file of [...files].slice(0,8-photos.length)){const c=await compressImg(file);setPhotos(p=>[...p,c]);}};
  const submit=()=>{
    if(!f.make||!f.model||!f.year||!f.city||!f.province||!f.dealer){alert("Fill all required (*) fields.");return;}
    if(ih&&!f.rate){alert("Enter a daily rate.");return;}
    if(!ih&&!f.price){alert("Enter a price.");return;}
    const scoreMap={"Excellent":5,"Good":4,"Fair":3,"Poor":2};
    onSave({...f,id:uid(),createdAt:Date.now(),year:+f.year,mileage:+f.mileage||0,price:ih?null:+f.price,rate:ih?+f.rate:null,rating:null,reviews:0,dealerRating:null,dealerReviews:[],cpo:false,featured:false,ph:null,photos,daysLot:0,recalls:0,conditionScore:scoreMap[f.condition]||3});
  };
  const Row=({label,full,ch})=><div style={{display:"flex",flexDirection:"column",gap:5,...(full?{gridColumn:"1/-1"}:{})}}><label style={{fontSize:9,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:T.M}}>{label}</label>{ch}</div>;
  const Sec=({t})=><div style={{gridColumn:"1/-1",fontSize:9,fontWeight:700,letterSpacing:3,textTransform:"uppercase",color:"#d4a843",paddingBottom:6,borderBottom:"1px solid rgba(212,168,67,.2)",marginTop:8}}>{t}</div>;
  const Sel=({k,opts})=><select style={IS} value={f[k]} onChange={e=>s(k,e.target.value)}>{opts.map(o=><option key={o}>{o}</option>)}</select>;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.9)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:16,backdropFilter:"blur(4px)"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:T.B2,border:"1px solid "+T.BD2,borderTop:"3px solid #d4a843",borderRadius:10,width:"100%",maxWidth:720,maxHeight:"92vh",overflowY:"auto",padding:26,position:"relative"}}>
        <button onClick={onClose} style={{position:"absolute",top:12,right:14,background:"none",border:"none",color:T.M,fontSize:20,cursor:"pointer"}}>✕</button>
        <div style={{fontWeight:900,fontSize:21,marginBottom:3,color:T.W}}>Post a Listing</div>
        <div style={{color:T.M,fontSize:12,marginBottom:20}}>Free — visible to buyers across Canada & USA instantly.</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
          <Sec t="Listing Type"/>
          <Row label="Type *" ch={<select style={IS} value={f.type} onChange={e=>s("type",e.target.value)}><option value="new">🆕 New Car</option><option value="used">🔄 Used Car</option><option value="hire">🔑 Car for Hire</option></select>}/>
          <Row label="Country *" ch={<select style={IS} value={f.country} onChange={e=>s("country",e.target.value)}><option value="CA">🇨🇦 Canada</option><option value="US">🇺🇸 United States</option></select>}/>
          <Sec t="VIN Auto-Fill (Optional — powered by NHTSA)"/>
          <div style={{gridColumn:"1/-1",display:"flex",gap:8,alignItems:"flex-end"}}>
            <div style={{flex:1}}><label style={{fontSize:9,color:T.M,letterSpacing:2,textTransform:"uppercase",display:"block",marginBottom:5}}>VIN (auto-fills vehicle fields)</label>
            <input style={{...IS,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:1}} value={f.vin} onChange={e=>s("vin",e.target.value.toUpperCase())} placeholder="Paste 17-char VIN to auto-fill" maxLength={17}/></div>
            <button onClick={autoVIN} disabled={vinLoad} style={{background:vinLoad?T.B4:"#d4a843",color:vinLoad?T.M:"#000",border:"none",padding:"9px 14px",fontWeight:700,fontSize:11,borderRadius:5,cursor:vinLoad?"not-allowed":"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>{vinLoad?"⏳":"🔍 Auto-Fill"}</button>
          </div>
          {vinDec&&<div style={{gridColumn:"1/-1",background:"rgba(39,174,96,.08)",border:"1px solid rgba(39,174,96,.2)",borderRadius:5,padding:"8px 12px",fontSize:11,color:"#27ae60"}}>{"✅ "+vinDec.year+" "+vinDec.make+" "+vinDec.model+" "+(vinDec.trim||"")+" · "+vinDec.engine}</div>}
          <Sec t="Vehicle Details"/>
          <Row label="Make *" ch={<><input style={IS} list="mkl9" value={f.make} onChange={e=>s("make",e.target.value)} placeholder="e.g. Toyota"/><datalist id="mkl9">{MAKES.map(m=><option key={m}>{m}</option>)}</datalist></>}/>
          <Row label="Model *" ch={<input style={IS} value={f.model} onChange={e=>s("model",e.target.value)} placeholder="e.g. RAV4 Hybrid"/>}/>
          <Row label="Year *" ch={<input style={IS} type="number" value={f.year} onChange={e=>s("year",e.target.value)} placeholder="2025"/>}/>
          <Row label="Trim" ch={<input style={IS} value={f.trim} onChange={e=>s("trim",e.target.value)} placeholder="e.g. XLE Premium"/>}/>
          <Row label="Body Style" ch={<Sel k="body" opts={BODIES}/>}/>
          <Row label="Exterior Colour" ch={<Sel k="extColor" opts={EXT_COLORS}/>}/>
          <Row label="Interior Colour" ch={<Sel k="intColor" opts={INT_COLORS}/>}/>
          <Row label="Fuel" ch={<Sel k="fuel" opts={FUELS}/>}/>
          <Row label="Transmission" ch={<Sel k="trans" opts={TRANS}/>}/>
          <Row label="Drive" ch={<Sel k="drive" opts={DRIVES}/>}/>
          <Row label="Odometer (km)" ch={<input style={IS} type="number" value={f.mileage} onChange={e=>s("mileage",e.target.value)} placeholder="0 for new"/>}/>
          <Row label="Condition" ch={<Sel k="condition" opts={CONDITIONS}/>}/>
          <Row label="Number of Owners" ch={<Sel k="owners" opts={OWNERS}/>}/>
          <Row label="Accident History" ch={<select style={IS} value={f.accidentFree?"yes":"no"} onChange={e=>s("accidentFree",e.target.value==="yes")}><option value="yes">No accidents reported</option><option value="no">Accident history</option></select>}/>
          <Sec t="Pricing & Location"/>
          {!ih&&<Row label="Price (CAD/USD) *" ch={<input style={IS} type="number" value={f.price} onChange={e=>s("price",e.target.value)} placeholder="34900"/>}/>}
          {ih&&<Row label="Daily Rate *" ch={<input style={IS} type="number" value={f.rate} onChange={e=>s("rate",e.target.value)} placeholder="79"/>}/>}
          <Row label="City *" ch={<input style={IS} value={f.city} onChange={e=>s("city",e.target.value)} placeholder="e.g. Calgary"/>}/>
          <Row label="Province / State *" ch={<input style={IS} value={f.province} onChange={e=>s("province",e.target.value)} placeholder="e.g. AB or WA"/>}/>
          <Sec t="Seller Details"/>
          <Row label="Seller Type" ch={<select style={IS} value={f.sellerType} onChange={e=>s("sellerType",e.target.value)}><option value="Dealer">Dealership</option><option value="Private">Private Seller</option></select>}/>
          <Row label="Name / Dealership *" ch={<input style={IS} value={f.dealer} onChange={e=>s("dealer",e.target.value)} placeholder="Name or dealership"/>}/>
          <Row label="Phone / WhatsApp" ch={<input style={IS} value={f.phone} onChange={e=>s("phone",e.target.value)} placeholder="+1 780 555 0000"/>}/>
          <Row label="Email" ch={<input style={IS} type="email" value={f.email} onChange={e=>s("email",e.target.value)} placeholder="sales@dealer.com"/>}/>
          <Row label="Description" full ch={<textarea style={{...IS,resize:"vertical",minHeight:80}} value={f.desc} onChange={e=>s("desc",e.target.value)} placeholder="Features, condition, service history, what is included…"/>}/>
          <div style={{gridColumn:"1/-1"}}>
            <label style={{fontSize:9,color:T.M,letterSpacing:2,textTransform:"uppercase",display:"block",marginBottom:6}}>Photos (up to 8) — auto-compressed</label>
            <div style={{border:"2px dashed "+T.BD2,borderRadius:7,padding:14,textAlign:"center",position:"relative",cursor:"pointer"}}>
              <input type="file" accept="image/*" multiple onChange={e=>handlePhotos(e.target.files)} style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",height:"100%"}}/>
              <div style={{color:T.M,fontSize:13}}>📷 Click or drag photos here · JPEG/PNG auto-compressed to 900px</div>
            </div>
            {photos.length>0&&<div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:8}}>
              {photos.map((p,i)=><div key={i} style={{position:"relative"}}><img src={p} style={{width:72,height:55,objectFit:"cover",borderRadius:4,border:"1px solid "+T.BD}}/><button onClick={()=>setPhotos(ps=>ps.filter((_,j)=>j!==i))} style={{position:"absolute",top:-4,right:-4,background:"#e74c3c",color:"#fff",border:"none",borderRadius:"50%",width:15,height:15,cursor:"pointer",fontSize:9,lineHeight:"15px",textAlign:"center"}}>×</button></div>)}
            </div>}
          </div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:20}}>
          <button onClick={onClose} style={{background:"none",border:"1px solid "+T.BD2,color:T.M,padding:"9px 16px",fontWeight:700,fontSize:11,borderRadius:5,cursor:"pointer",fontFamily:"inherit"}}>Cancel</button>
          <button onClick={submit} style={{background:"#d4a843",color:"#000",border:"none",padding:"9px 26px",fontWeight:700,fontSize:13,borderRadius:5,cursor:"pointer",fontFamily:"inherit"}}>Post Listing →</button>
        </div>
      </div>
    </div>
  );
}

// ─── TRADE-IN ─────────────────────────────────────────────────────────────────
function TradeIn({rows,T}){
  const [f,setF]=useState({make:"Toyota",model:"",year:"",mileage:"",condition:"Good",accidents:"none"});
  const [res,setRes]=useState(null);
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const IS={background:T.B3,border:"1px solid "+T.BD2,color:T.W,padding:"8px 11px",fontSize:12,borderRadius:5,outline:"none",width:"100%",fontFamily:"inherit"};
  const calc=()=>{
    if(!f.model||!f.year||!f.mileage){alert("Fill all fields.");return;}
    const yr=+f.year,km=+f.mileage;
    const base=Math.max(2000,35000-(2025-yr)*2200);
    const mf=Math.max(.45,1-(km/200000)*.45);
    const cf={Excellent:1.08,Good:.95,Fair:.78,Poor:.62}[f.condition]||.9;
    const af={none:1,minor:.91,major:.75}[f.accidents]||1;
    const v=base*mf*cf*af;
    setRes({lo:Math.round(v*.87/100)*100,hi:Math.round(v*1.09/100)*100,notes:[km>100000&&"⚠️ High mileage reduces value",f.condition==="Poor"&&"⚠️ Poor condition significantly reduces value",f.accidents!=="none"&&"⚠️ Accident history reduces value",yr>=2023&&"✅ Recent model year adds value",f.condition==="Excellent"&&"✅ Excellent condition premium"].filter(Boolean)});
  };
  return(
    <div style={{padding:"22px 20px",maxWidth:680}}>
      <div style={{fontWeight:900,fontSize:21,marginBottom:3,color:T.W}}>💱 Trade-In Value Estimator</div>
      <p style={{color:T.M,fontSize:13,marginBottom:20}}>Instant market value estimate — based on KBB/CARFAX methodology</p>
      <div style={{background:T.B2,border:"1px solid "+T.BD2,borderRadius:10,padding:22}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          {[["Make *","make","sel",MAKES],["Model *","model","txt","e.g. Camry"],["Year *","year","num","e.g. 2020"],["Odometer (km) *","mileage","num","e.g. 55000"],["Condition","condition","sel",CONDITIONS],["Accidents","accidents","sel",["none","minor","major"]]].map(([l,k,t,opts])=>(
            <div key={k}><label style={{fontSize:9,color:T.M,letterSpacing:2,textTransform:"uppercase",display:"block",marginBottom:5}}>{l}</label>
            {t==="sel"?<select style={IS} value={f[k]} onChange={e=>sf(k,e.target.value)}>{(Array.isArray(opts)?opts:MAKES).map(o=><option key={o}>{o}</option>)}</select>:<input style={IS} type={t==="num"?"number":"text"} value={f[k]} onChange={e=>sf(k,e.target.value)} placeholder={opts}/>}</div>
          ))}
        </div>
        <button onClick={calc} style={{background:"#d4a843",color:"#000",border:"none",padding:"10px 26px",fontWeight:700,fontSize:13,borderRadius:5,cursor:"pointer",fontFamily:"inherit"}}>Get My Estimate →</button>
        {res&&<div style={{marginTop:18,background:"linear-gradient(135deg,#0d0900,#180e00)",border:"1px solid rgba(212,168,67,.3)",borderRadius:8,padding:18}}>
          <div style={{fontSize:9,color:"#d4a843",letterSpacing:3,textTransform:"uppercase",marginBottom:5}}>Estimated Trade-In Value</div>
          <div style={{fontWeight:900,fontSize:32,color:"#d4a843"}}>{fmt(res.lo)+" "}<span style={{fontSize:16,color:T.M,fontWeight:400}}>to</span>{" "+fmt(res.hi)}</div>
          <div style={{fontSize:11,color:T.M,marginTop:3}}>CAD / USD · Based on year, mileage, condition & history</div>
          {res.notes.length>0&&<div style={{marginTop:10,fontSize:12,color:T.W,lineHeight:1.8}}>{res.notes.join(" · ")}</div>}
          <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid rgba(212,168,67,.2)"}}>
            <div style={{fontSize:10,color:T.M,marginBottom:7}}>📢 Dealers who may make an offer:</div>

// ─── VALUE TRACKER ────────────────────────────────────────────────────────────
function ValueTracker({T}){
  const [tracked,setTracked]=useState(()=>{try{return JSON.parse(localStorage.getItem("dn_tracked"))||[];}catch{return[];}});
  const [f,setF]=useState({make:"Toyota",model:"Camry",year:"2022",mileage:"50000"});
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const IS={background:T.B3,border:"1px solid "+T.BD2,color:T.W,padding:"8px 11px",fontSize:12,borderRadius:5,outline:"none",width:"100%",fontFamily:"inherit"};
  const add=()=>{
    if(!f.make||!f.model||!f.year)return;
    const yr=+f.year,km=+f.mileage||50000;
    const base=Math.max(2000,35000-(2025-yr)*2200);
    const val=Math.round(base*Math.max(.45,1-(km/200000)*.45)*.95/100)*100;
    const entry={id:uid(),make:f.make,model:f.model,year:yr,mileage:km,value:val,tracked:Date.now()};
    const upd=[...tracked,entry]; setTracked(upd);
    try{localStorage.setItem("dn_tracked",JSON.stringify(upd));}catch{}
  };
  const rem=id=>{const u=tracked.filter(t=>t.id!==id);setTracked(u);try{localStorage.setItem("dn_tracked",JSON.stringify(u));}catch{}};
  return(
    <div style={{padding:"22px 20px",maxWidth:700}}>
      <div style={{fontWeight:900,fontSize:21,marginBottom:3,color:T.W}}>📊 Monthly Value Tracker</div>
      <p style={{color:T.M,fontSize:13,marginBottom:20}}>Track your vehicle's estimated market value over time</p>
      <div style={{background:T.B2,border:"1px solid "+T.BD2,borderRadius:10,padding:22,marginBottom:20}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div><label style={{fontSize:9,color:T.M,letterSpacing:2,textTransform:"uppercase",display:"block",marginBottom:5}}>Make</label><input style={IS} list="mkl8" value={f.make} onChange={e=>sf("make",e.target.value)}/><datalist id="mkl8">{MAKES.map(m=><option key={m}>{m}</option>)}</datalist></div>
          <div><label style={{fontSize:9,color:T.M,letterSpacing:2,textTransform:"uppercase",display:"block",marginBottom:5}}>Model</label><input style={IS} value={f.model} onChange={e=>sf("model",e.target.value)} placeholder="e.g. Camry"/></div>
          <div><label style={{fontSize:9,color:T.M,letterSpacing:2,textTransform:"uppercase",display:"block",marginBottom:5}}>Year</label><input style={IS} type="number" value={f.year} onChange={e=>sf("year",e.target.value)}/></div>
          <div><label style={{fontSize:9,color:T.M,letterSpacing:2,textTransform:"uppercase",display:"block",marginBottom:5}}>Odometer (km)</label><input style={IS} type="number" value={f.mileage} onChange={e=>sf("mileage",e.target.value)} placeholder="50000"/></div>
        </div>
        <button onClick={add} style={{background:"#d4a843",color:"#000",border:"none",padding:"9px 22px",fontWeight:700,fontSize:12,borderRadius:5,cursor:"pointer",fontFamily:"inherit"}}>+ Track This Vehicle</button>
      </div>
      {tracked.length>0&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
        {tracked.map(t=>{
          const dep=Math.round(t.value*0.012);
          return <div key={t.id} style={{background:T.B2,border:"1px solid "+T.BD2,borderRadius:8,padding:16,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
            <div><div style={{fontWeight:800,fontSize:15,color:T.W}}>{t.year+" "+t.make+" "+t.model}</div>
            <div style={{fontSize:11,color:T.M,marginTop:2}}>{Number(t.mileage).toLocaleString()+" km · Tracked "+new Date(t.tracked).toLocaleDateString("en-CA")}</div>
            <div style={{fontSize:10,color:"#27ae60",marginTop:4}}>{"Estimated depreciation: ~"+fmt(dep)+"/month"}</div></div>
            <div style={{textAlign:"right"}}>
              <div style={{fontWeight:900,fontSize:26,color:"#d4a843"}}>{fmt(t.value)}</div>
              <div style={{fontSize:10,color:T.M}}>current est. value</div>
              <button onClick={()=>rem(t.id)} style={{marginTop:6,background:"none",border:"1px solid rgba(231,76,60,.3)",color:"#e74c3c",padding:"3px 9px",fontSize:9,borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>Remove</button>
            </div>
          </div>;
        })}
        <div style={{fontSize:11,color:T.DIM,marginTop:4}}>⚠️ Estimates only. Based on market methodology.</div>
      </div>}
      {tracked.length===0&&<div style={{textAlign:"center",padding:"40px",color:T.M,background:T.B2,borderRadius:10,border:"1px solid "+T.BD}}>
        <div style={{fontSize:28,marginBottom:8}}>📊</div>
        <div style={{fontWeight:700,fontSize:14,color:T.W,marginBottom:4}}>No vehicles tracked yet</div>
        <div style={{fontSize:12}}>Add a vehicle above to start tracking its value</div>
      </div>}
    </div>
  );
}

  const T=dark?THEMES.dark:THEMES.light;

  useEffect(()=>{if(!localStorage.getItem(SK))sDB(SEED);setRows(gDB());setSv(gSv());},[]);
  useEffect(()=>{try{localStorage.setItem(SK_TH,dark?"dark":"light");}catch{};},[dark]);

  const refresh=()=>setRows(gDB());
  const toast2=useCallback((msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast({msg:"",type:"success"}),3000);},[]);
  const sf=(k,v)=>setF(p=>({...p,[k]:v}));

  const handleSave=l=>{const d=gDB();d.unshift(l);sDB(d);refresh();setShowSub(false);toast2("✅ "+l.make+" "+l.model+" listed!");};
  const handleDel=id=>{sDB(gDB().filter(r=>r.id!==id));refresh();setDet(null);toast2("Listing deleted.","error");};
  const toggleSv=id=>{const s=gSv();const n=s.includes(id)?s.filter(x=>x!==id):[...s,id];sSv(n);setSv(n);toast2(n.includes(id)?"★ Saved":"Removed from saved");};
  const toggleCmp=id=>{setCmp(p=>p.includes(id)?p.filter(x=>x!==id):p.length<4?[...p,id]:p);};
  const openDet=id=>{addRec(id);setDet(id);};

  const apF=(type,list=rows)=>[...list].filter(l=>{
    if(l.type!==type)return false;
    if(f.country&&l.country!==f.country)return false;
    if(f.make&&l.make!==f.make)return false;
    if(f.body&&l.body!==f.body)return false;
    if(f.city&&!(l.city+" "+l.province).toLowerCase().includes(f.city.toLowerCase()))return false;
    if(f.extColor&&l.extColor&&!l.extColor.toLowerCase().includes(f.extColor.toLowerCase()))return false;
    if(f.intColor&&l.intColor&&!l.intColor.toLowerCase().includes(f.intColor.toLowerCase()))return false;
    if(f.maxP<200000&&(l.price||0)>f.maxP)return false;
    if(f.yr&&l.year<+f.yr)return false;
    if(l.fuel&&!f.fuels.includes(l.fuel))return false;
    if(l.trans&&!f.trans.includes(l.trans))return false;
    if(l.drive&&!f.drives.includes(l.drive))return false;
    if(!f.seller.includes(l.sellerType||"Dealer"))return false;
    if(f.cpoOnly&&!l.cpo)return false;
    if(f.maxKm&&(l.mileage||0)>+f.maxKm)return false;
    if(f.maxRate<300&&(l.rate||0)>f.maxRate)return false;
    if(f.dealsOnly){const d=getDeal(l);if(!d||d.label.includes("Above"))return false;}
    if(f.accFree&&!l.accidentFree)return false;
    if(f.owners&&l.owners&&l.owners!==f.owners)return false;
    if(f.condition&&l.condition&&l.condition!==f.condition)return false;
    if(search){const q=search.toLowerCase();if(!(l.make+" "+l.model+" "+l.city+" "+l.province+" "+(l.desc||"")+" "+(l.extColor||"")+" "+(l.intColor||"")).toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>{
    if(sort==="price_asc")return (a.price||a.rate||0)-(b.price||b.rate||0);
    if(sort==="price_desc")return (b.price||b.rate||0)-(a.price||a.rate||0);
    if(sort==="year_desc")return b.year-a.year;
    if(sort==="mileage_asc")return (a.mileage||0)-(b.mileage||0);
    if(sort==="days_asc")return (a.daysLot||0)-(b.daysLot||0);
    return b.createdAt-a.createdAt;
  });

              <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
                {[["🇨🇦",rows.filter(r=>r.country==="CA").length,"In Canada"],["🇺🇸",rows.filter(r=>r.country==="US").length,"In USA"],["⭐",ACPO.length,"CPO"],["🏪",new Set(rows.map(r=>r.dealer).filter(Boolean)).size,"Sellers"]].map(([ic,n,l])=>(
                  <div key={l}><div style={{fontWeight:900,fontSize:18,color:T.W}}><span style={{color:"#e8400c"}}>{n}</span></div><div style={{fontSize:9,color:T.M,letterSpacing:1,textTransform:"uppercase"}}>{ic+" "+l}</div></div>
                ))}
              </div>
            </div>
          </div>

          <div style={{padding:"22px 18px 0"}}>
            <div style={{fontSize:9,color:T.M,letterSpacing:3,textTransform:"uppercase",fontWeight:700,marginBottom:9}}>Browse by Body Style</div>
            <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:26}}>
              {BODIES.map(b=>(
                <button key={b} onClick={()=>{sf("body",b);setPage("used");}} style={{background:T.B2,border:"1px solid "+T.BD,color:T.W,padding:"7px 11px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:58}}>
                  <img src={CAR_IMGS[b]||Object.values(CAR_IMGS)[0]} style={{width:55,height:33,objectFit:"cover",borderRadius:3}}/>
                  <span style={{fontSize:9,fontWeight:600}}>{b}</span>
                </button>
              ))}
            </div>
            {recent.length>0&&<div style={{marginBottom:26}}><SHdr icon="🕐" title="Recently Viewed" count={0} color={T.M}/><CGrid rows={recent} {...cProps}/></div>}
            <div style={{marginBottom:26}}><SHdr icon="⭐" title="Featured Listings" count={rows.filter(r=>r.featured).length} color="#e8400c" sub="Hand-picked from top dealers"/><CGrid rows={rows.filter(r=>r.featured).slice(0,4)} {...cProps}/></div>
            <div style={{marginBottom:26}}><SHdr icon="🔥" title="Great Deals" count={rows.filter(r=>getDeal(r)?.label.includes("Great")).length} color="#27ae60" onAll={()=>{sf("dealsOnly",true);setPage("used");}} sub="Prices significantly below market average"/><CGrid rows={rows.filter(r=>getDeal(r)?.label.includes("Great")).slice(0,4)} {...cProps}/></div>
            <div style={{marginBottom:26}}><SHdr icon="🆕" title="New Cars" count={AN.length} color="#e8400c" onAll={()=>setPage("new")} sub="Zero-kilometre from authorised dealers"/><CGrid rows={AN.slice(0,4)} {...cProps}/></div>
            <div style={{marginBottom:26}}><SHdr icon="🔄" title="Used Cars" count={AU.length} color="#2980b9" onAll={()=>setPage("used")} sub="Pre-owned from dealers and private sellers"/><CGrid rows={AU.slice(0,4)} {...cProps}/></div>
            <div style={{marginBottom:26,background:dark?"linear-gradient(135deg,#040d04,#081408)":"linear-gradient(135deg,#ecfdf5,#d1fae5)",border:"1px solid rgba(39,174,96,.25)",borderRadius:12,padding:"18px 16px"}}><SHdr icon="⚡" title="Electric & Hybrid" count={AEV.length} color="#27ae60" onAll={()=>setPage("ev")} sub="EVs, hybrids & plug-in hybrids"/><CGrid rows={AEV.slice(0,4)} {...cProps}/></div>
            <div style={{marginBottom:26,background:dark?"linear-gradient(135deg,#040814,#080e1a)":"linear-gradient(135deg,#eff6ff,#dbeafe)",border:"1px solid rgba(41,128,185,.25)",borderRadius:12,padding:"18px 16px"}}><SHdr icon="✅" title="Certified Pre-Owned" count={ACPO.length} color="#2980b9" onAll={()=>setPage("cpo")} sub="Factory-inspected, warranty-backed"/><CGrid rows={ACPO.slice(0,4)} {...cProps}/></div>
            <div style={{marginBottom:26}}><SHdr icon="🔑" title="Car Hire & Rentals" count={AH.length} color="#d4a843" onAll={()=>setPage("hire")} sub="Daily & weekly rentals"/><CGrid rows={AH.slice(0,4)} {...cProps}/></div>
            <div style={{marginBottom:32,background:dark?"linear-gradient(135deg,#100700,#1a0c00)":"linear-gradient(135deg,#fff7ed,#ffedd5)",border:"1px solid rgba(232,64,12,.2)",borderRadius:12,padding:"22px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:14}}>
              <div><div style={{fontSize:9,letterSpacing:3,textTransform:"uppercase",color:"#e8400c",fontWeight:700,marginBottom:5}}>For Dealers & Sellers</div><h3 style={{fontWeight:900,fontSize:19,margin:"0 0 5px",color:T.W}}>List Your Vehicle — It is Free</h3><p style={{color:T.M,fontSize:12,margin:0,maxWidth:340,lineHeight:1.6}}>VIN auto-fill, photo upload, deal rating, condition score, colour filters. Post in 2 minutes.</p></div>
              <button onClick={()=>setShowSub(true)} style={{background:"#e8400c",color:"#fff",border:"none",padding:"11px 24px",fontWeight:700,fontSize:13,borderRadius:7,cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>+ Post Free</button>
            </div>
          </div>
        </div>
      )}

      {page==="new"&&<div style={{display:"flex",position:"relative"}}><FilterDrawer type="new" f={f} sf={sf} T={T} open={drawerOpen} onClose={()=>setDrawerOpen(false)}/><div style={{flex:1,padding:"20px",minWidth:0}}><SHdr icon="🆕" title="New Cars for Sale" count={NL.length} color="#e8400c" sub="Zero-kilometre from authorised dealers"/><SearchBar type="new"/><CGrid rows={NL} {...cProps}/></div></div>}
      {page==="used"&&<div style={{display:"flex",position:"relative"}}><FilterDrawer type="used" f={f} sf={sf} T={T} open={drawerOpen} onClose={()=>setDrawerOpen(false)}/><div style={{flex:1,padding:"20px",minWidth:0}}><SHdr icon="🔄" title="Used Cars for Sale" count={UL.length} color="#2980b9" sub="Pre-owned from dealers and private sellers"/><SearchBar type="used"/><CGrid rows={UL} {...cProps}/></div></div>}
      {page==="hire"&&(<div style={{display:"flex",position:"relative"}}><FilterDrawer type="hire" f={f} sf={sf} T={T} open={drawerOpen} onClose={()=>setDrawerOpen(false)}/><div style={{flex:1,padding:"20px",minWidth:0}}>
        <SHdr icon="🔑" title="Car Hire & Rentals" count={HL.length} color="#d4a843" sub="Daily & weekly rentals"/>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:7,marginBottom:16}}>
          {[["💚","Budget","< $60/day"],["💛","Mid","$60–$100"],["🧡","Premium","$100–$150"],["💎","Luxury","$150+"]].map(([ic,t,s])=>(
            <div key={t} style={{background:T.B2,border:"1px solid "+T.BD,borderRadius:8,padding:"9px 11px",textAlign:"center"}}>
              <div style={{fontSize:16,marginBottom:2}}>{ic}</div><div style={{fontWeight:700,fontSize:11,color:T.W}}>{t}</div><div style={{fontSize:9,color:T.M,marginTop:1}}>{s}</div>
            </div>
          ))}
        </div>
        <SearchBar type="hire"/><CGrid rows={HL} {...cProps}/>
      </div></div>)}
      {page==="ev"&&<div style={{padding:"20px"}}><SHdr icon="⚡" title="Electric & Hybrid" count={AEV.length} color="#27ae60" sub="EVs, hybrids & plug-in hybrids"/><CGrid rows={AEV} {...cProps}/></div>}
      {page==="cpo"&&<div style={{padding:"20px"}}><SHdr icon="✅" title="Certified Pre-Owned" count={ACPO.length} color="#2980b9" sub="Factory-inspected, warranty-backed"/><CGrid rows={ACPO} {...cProps}/></div>}
      {page==="saved"&&(<div style={{padding:"20px"}}>
        <SHdr icon="★" title="Saved Vehicles" count={ASV.length} color="#e8400c" sub="Your bookmarked listings"/>
        {ASV.length===0?<div style={{textAlign:"center",padding:"50px",color:T.M,background:T.B2,borderRadius:10,border:"1px solid "+T.BD}}><div style={{fontSize:32,marginBottom:8}}>★</div><div style={{fontWeight:700,fontSize:15,color:T.W,marginBottom:5}}>No saved vehicles</div><button onClick={()=>setPage("home")} style={{marginTop:10,background:"#e8400c",color:"#fff",border:"none",padding:"7px 16px",fontWeight:700,fontSize:11,borderRadius:5,cursor:"pointer",fontFamily:"inherit"}}>Browse Listings</button></div>:<CGrid rows={ASV} {...cProps}/>}
      </div>)}
      {page==="tradein"&&<TradeIn rows={rows} T={T}/>}
      {page==="tracker"&&<ValueTracker T={T}/>}
      {page==="manage"&&(<div style={{padding:"20px"}}>
        <div style={{fontWeight:900,fontSize:19,marginBottom:3,color:T.W}}>⚙️ Manage Listings</div>
        <p style={{color:T.M,fontSize:12,marginBottom:16}}>{rows.length+" total · click to view"}</p>
        {rows.length===0?<div style={{textAlign:"center",padding:"50px",color:T.M,background:T.B2,borderRadius:10,border:"1px solid "+T.BD}}><div style={{fontWeight:700,fontSize:15,color:T.W,marginBottom:5}}>No listings</div><button onClick={()=>setShowSub(true)} style={{background:"#e8400c",color:"#fff",border:"none",padding:"7px 16px",fontWeight:700,fontSize:11,borderRadius:5,cursor:"pointer",fontFamily:"inherit"}}>Post First</button></div>:(
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:600}}>
              <thead><tr style={{background:T.B2}}>{["Vehicle","Type","Price","Deal","Condition","Location","Days",""].map(h=><th key={h} style={{padding:"8px 11px",textAlign:"left",fontWeight:700,fontSize:8,letterSpacing:2,textTransform:"uppercase",color:T.M,borderBottom:"1px solid "+T.BD}}>{h}</th>)}</tr></thead>
              <tbody>{rows.map(car=>(
                <tr key={car.id} style={{cursor:"pointer"}} onClick={()=>openDet(car.id)}>
                  <td style={{padding:"9px 11px",borderBottom:"1px solid "+T.BD,fontSize:12,color:T.W}}><strong>{car.year+" "+car.make+" "+car.model}</strong><div style={{fontSize:9,color:T.M}}>{car.trim}</div></td>
                  <td style={{padding:"9px 11px",borderBottom:"1px solid "+T.BD}}><span style={bst(car.type)}>{car.type.toUpperCase()}</span></td>
                  <td style={{padding:"9px 11px",borderBottom:"1px solid "+T.BD,fontSize:11,fontWeight:700,color:T.W}}>{car.type==="hire"?"$"+car.rate+"/day":fmt(car.price)}</td>
                  <td style={{padding:"9px 11px",borderBottom:"1px solid "+T.BD,fontSize:11}}>{getDeal(car)?.label||"—"}</td>
                  <td style={{padding:"9px 11px",borderBottom:"1px solid "+T.BD,fontSize:11,color:T.M}}>{car.condition||"—"}</td>
                  <td style={{padding:"9px 11px",borderBottom:"1px solid "+T.BD,fontSize:11,color:T.M}}>{car.city+", "+car.province+" "+(car.country==="CA"?"🇨🇦":"🇺🇸")}</td>
                  <td style={{padding:"9px 11px",borderBottom:"1px solid "+T.BD,fontSize:11,color:car.daysLot>20?"#e74c3c":T.M}}>{(car.daysLot||0)+"d"}</td>
                  <td style={{padding:"9px 11px",borderBottom:"1px solid "+T.BD}} onClick={e=>e.stopPropagation()}><button onClick={()=>handleDel(car.id)} style={{background:"none",border:"1px solid rgba(231,76,60,.35)",color:"#e74c3c",padding:"3px 8px",fontWeight:700,fontSize:8,borderRadius:3,cursor:"pointer",fontFamily:"inherit"}}>Delete</button></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </div>)}

      {cmp.length>0&&!showCmp&&(
        <button onClick={()=>setShowCmp(true)} style={{position:"fixed",bottom:64,left:"50%",transform:"translateX(-50%)",background:"#2980b9",color:"#fff",padding:"9px 20px",borderRadius:24,fontWeight:700,fontSize:12,cursor:"pointer",zIndex:150,boxShadow:"0 4px 20px rgba(0,0,0,.5)",display:"flex",gap:9,alignItems:"center",border:"none",fontFamily:"inherit",whiteSpace:"nowrap"}}>
          {"⚖️ Compare "+cmp.length+" vehicle"+(cmp.length>1?"s":"")}<span style={{background:"rgba(255,255,255,.2)",borderRadius:12,padding:"1px 7px"}}>{cmp.length+"/4"}</span>
        </button>
      )}

      </div>

      {det&&<DetailModal carId={det} rows={rows} sv={sv} cmp={cmp} onClose={()=>setDet(null)} onDel={handleDel} onSave={toggleSv} onCmp={toggleCmp} onFin={p=>{setDet(null);setFinP(p);}} onVIN={v=>{setDet(null);setVinP(v);}} T={T}/>}
      {showSub&&<SubmitModal onClose={()=>setShowSub(false)} onSave={handleSave} toast2={toast2} T={T}/>}
      {showCmp&&<CmpModal ids={cmp} rows={rows} onRemove={id=>setCmp(p=>p.filter(x=>x!==id))} onClear={()=>setCmp([])} onClose={()=>setShowCmp(false)} T={T}/>}
      {finP&&<FinModal price={finP} onClose={()=>setFinP(null)} T={T}/>}
      {vinP!==null&&<VINModal prefill={vinP} rows={rows} onClose={()=>setVinP(null)} T={T}/>}
      <Toast msg={toast.msg} type={toast.type} T={T}/>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
